<!DOCTYPE html>
<html lang="en">
  <head>
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
      charset="UTF-8"
    />
    <title>Kviz o Sloveniji 🇸🇮</title>
    <!-- Google Font -->
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" type="image/x-icon" href="img/cake.png" />
    <!-- Stylesheet -->
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="background">
      <div class="start-screen">
        <button id="start-button">Začni</button>
      </div>
      <div id="display-container">
        <div class="header">
          <div class="number-of-count">
            <span class="number-of-question">Vprašanje 1/</span>
          </div>
          <div class="timer-div">
            <img src="img/timer-icon.svg" id="timer-icon" />
            <span class="time-left">20s</span>
          </div>
        </div>
        <div id="container">
          <!-- questions and options will be displayed here -->
        </div>
        <button id="next-button">Naprej</button>
      </div>
      <div class="score-container hide">
        <div id="user-score">Rezultat kviza</div>
        <p id="user-score-win" class="hide">
          Čestitamo! 🎉
        </p>
        <button id="restart">Poskusi znova ❌</button>
      </div>
    </div>
    <!-- <div id="footer">MC, 28.10.2022</div> -->
    <!-- Script -->
    <script src="script.js"></script>
  </body>
</html>
