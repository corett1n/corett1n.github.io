<!DOCTYPE html>
<html lang="en">
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" charset="UTF-8"/>
    <title>28.10.2022</title>
    <!-- Google Font -->
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" type="image/x-icon" href="img/cake.png">
    <!-- Stylesheet -->
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="start-screen-name card">
      <p class="question">Kako ti je ime?</p>
      <input type="text" id="name-input" name="name" placeholder="Ime">
      <button id="next-button-name">Naprej</button>
    </div>
    <div class="start-screen-date card hide">
      <p class="question">Dobro Jana, kaj je danes?</p>
      <input type="date" id="date-input" name="date">
      <button id="next-button-date">Naprej</button>
    </div>
    <div class="start-screen-event card hide">
      <p class="question">Hmm.. praviš, da imaš rojstni dan..</p>
      <button id="next-button-event">Naprej</button>
    </div>
    <div class="start-screen-age card hide">
      <p class="question">Koliko let pa imaš?</p>
      <input type="number" id="age-input" name="age" placeholder="69">
      <button id="next-button-age">Naprej</button>
    </div>
    <div class="start-screen hide">
      <p class="question">21 let -> 21 vprašanj</p>
      <button id="start-button">Začni</button>
    </div>
    <div id="display-container">
      <div class="header">
        <div class="number-of-count">
          <span class="number-of-question">Vprašanje 1/3</span>
        </div>
        <div class="timer-div">
          <img src="img/timer-icon.svg" />
          <span class="time-left">10s</span>
        </div>
      </div>
      <div id="container">
        <!-- questions and options will be displayed here -->
      </div>
      <button id="next-button">Naprej</button>
    </div>
    <div class="score-container hide">
      <div id="user-score">Rezultat kviza</div>
      <button id="restart">Poskusi znova</button>
      <button id="to-the-code" class="hide">Pojdi na presenečenje</button>
    </div>
    <div class="qr-code hide">
      <img src="" alt="">
    </div>
    <!-- Script -->
    <script src="script.js"></script>
  </body>
</html>
